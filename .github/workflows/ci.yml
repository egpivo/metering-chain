name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check code
        run: cargo check --all-targets

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace

  perf-warning:
    name: Perf Baseline (Warning Only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run perf smoke harness
        run: cargo test --test perf_smoke -- --nocapture 2>&1 | tee perf_smoke_output.txt

      - name: Evaluate perf regression thresholds (warning only)
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys

          # Baseline medians from .local/benchmark_baseline.md (2026-02-10)
          baseline = {
              "small": {"replay_ms": 0, "recompute_ms": 1, "replay_tx_per_sec": 149963.39},
              "medium": {"replay_ms": 2, "recompute_ms": 6, "replay_tx_per_sec": 176325.96},
              "large": {"replay_ms": 5, "recompute_ms": 11, "replay_tx_per_sec": 180497.19},
          }
          # Local provisional candidates from .local/benchmark_baseline.md (2026-03-27).
          # These are visibility checks only, not CI-ready hard gates.
          local_provisional_large = {
              "replay_ms_max": 7,
              "recompute_ms_max": 14,
              "replay_tx_per_sec_min": 150000.0,
          }

          replay_regression_limit = 1.20   # >20%
          recompute_regression_limit = 1.25  # >25% (medium/large)

          line_re = re.compile(
              r"\[perf_smoke\]\s+dataset=(\w+)\s+txs=\d+\s+replay_ms=(\d+)\s+"
              r"replay_tx_per_sec=([0-9.]+)\s+snapshot_restore_ms=\d+\s+recompute_ms=(\d+)"
          )

          metrics = {}
          with open("perf_smoke_output.txt", "r", encoding="utf-8") as f:
              for raw in f:
                  m = line_re.search(raw)
                  if m:
                      ds = m.group(1).lower()
                      metrics[ds] = {
                          "replay_ms": int(m.group(2)),
                          "replay_tx_per_sec": float(m.group(3)),
                          "recompute_ms": int(m.group(4)),
                      }

          missing = [ds for ds in baseline.keys() if ds not in metrics]
          if missing:
              print(f"::warning::perf_smoke metrics missing datasets: {', '.join(missing)}")
              summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
              if summary_path:
                  with open(summary_path, "a", encoding="utf-8") as s:
                      s.write("## Perf Baseline (Warning Only)\n\n")
                      s.write("Could not parse perf output for datasets: ")
                      s.write(", ".join(missing))
                      s.write("\n")
              sys.exit(0)

          replay_regressed = []
          recompute_regressed = []

          for ds, values in metrics.items():
              b = baseline[ds]
              # For zero-baseline latency, only flag if it rises above 1ms.
              if b["replay_ms"] == 0:
                  if values["replay_ms"] > 1:
                      replay_regressed.append(ds)
              else:
                  if values["replay_ms"] > b["replay_ms"] * replay_regression_limit:
                      replay_regressed.append(ds)

              if ds in ("medium", "large"):
                  if values["recompute_ms"] > b["recompute_ms"] * recompute_regression_limit:
                      recompute_regressed.append(ds)

          if len(replay_regressed) >= 2:
              print(
                  "::warning::perf-risk replay latency regression >20% in "
                  f"{', '.join(sorted(replay_regressed))}. Investigate before release."
              )

          if recompute_regressed:
              print(
                  "::warning::perf-risk recompute latency regression >25% in "
                  f"{', '.join(sorted(recompute_regressed))}. Investigate before release."
              )

          large = metrics["large"]
          provisional_warnings = []
          if large["replay_ms"] > local_provisional_large["replay_ms_max"]:
              provisional_warnings.append(
                  f"large replay_ms {large['replay_ms']} > {local_provisional_large['replay_ms_max']}"
              )
          if large["recompute_ms"] > local_provisional_large["recompute_ms_max"]:
              provisional_warnings.append(
                  f"large recompute_ms {large['recompute_ms']} > {local_provisional_large['recompute_ms_max']}"
              )
          if large["replay_tx_per_sec"] < local_provisional_large["replay_tx_per_sec_min"]:
              provisional_warnings.append(
                  f"large replay_tx_per_sec {large['replay_tx_per_sec']:.2f} < {local_provisional_large['replay_tx_per_sec_min']:.2f}"
              )
          if provisional_warnings:
              print("::warning::local provisional perf candidates breached: " + "; ".join(provisional_warnings))

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as s:
                  s.write("## Perf Baseline (Warning Only)\n\n")
                  s.write("| Dataset | Replay ms (actual/baseline) | Recompute ms (actual/baseline) | Replay tx/s (actual/baseline) |\n")
                  s.write("|---|---:|---:|---:|\n")
                  for ds in ("small", "medium", "large"):
                      s.write(
                          f"| {ds} | {metrics[ds]['replay_ms']}/{baseline[ds]['replay_ms']} | "
                          f"{metrics[ds]['recompute_ms']}/{baseline[ds]['recompute_ms']} | "
                          f"{metrics[ds]['replay_tx_per_sec']:.2f}/{baseline[ds]['replay_tx_per_sec']:.2f} |\n"
                      )
                  s.write("\n")
                  s.write("### Local Provisional Candidates (Large Dataset)\n\n")
                  s.write("| Metric | Actual | Candidate | Result |\n")
                  s.write("|---|---:|---:|---|\n")
                  replay_ok = large["replay_ms"] <= local_provisional_large["replay_ms_max"]
                  recompute_ok = large["recompute_ms"] <= local_provisional_large["recompute_ms_max"]
                  throughput_ok = large["replay_tx_per_sec"] >= local_provisional_large["replay_tx_per_sec_min"]
                  s.write(
                      f"| replay_ms (max) | {large['replay_ms']} | {local_provisional_large['replay_ms_max']} | "
                      f"{'PASS' if replay_ok else 'WARN'} |\n"
                  )
                  s.write(
                      f"| recompute_ms (max) | {large['recompute_ms']} | {local_provisional_large['recompute_ms_max']} | "
                      f"{'PASS' if recompute_ok else 'WARN'} |\n"
                  )
                  s.write(
                      f"| replay_tx_per_sec (min) | {large['replay_tx_per_sec']:.2f} | {local_provisional_large['replay_tx_per_sec_min']:.2f} | "
                      f"{'PASS' if throughput_ok else 'WARN'} |\n"
                  )
                  s.write("\n")
                  if len(replay_regressed) >= 2 or recompute_regressed or provisional_warnings:
                      s.write("Status: WARNING (non-blocking)\n")
                  else:
                      s.write("Status: OK\n")

          print("Perf warning evaluation complete (non-blocking).")
          PY

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend build
        run: npm run build

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend tests
        run: npm run test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cov-

      - name: Generate coverage
        run: cargo llvm-cov --workspace --summary-only
      - name: Generate lcov for Codecov
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: egpivo/metering-chain
          fail_ci_if_error: false
      - name: Coverage gate (global line coverage ≥ 50%, raise to 70% per policy)
        run: cargo llvm-cov --workspace --fail-under-lines 50
